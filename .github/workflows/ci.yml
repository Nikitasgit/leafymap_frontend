name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  NEXT_PUBLIC_API_URL: https://example.com
  NEXT_PUBLIC_MAPBOX_TOKEN: dummy
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: dummy

jobs:
  ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
